<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kris — Deqly</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f5f4f2;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 24px 10px;
      gap: 4px;
    }
    .page-header img {
      height: 48px;
      width: auto;
      margin-bottom: 4px;
    }
    .page-header h1 {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #0a0a0a;
      margin-top: 0;
    }
    .page-header p {
      font-size: 13px;
      color: #999;
      font-weight: 400;
      letter-spacing: 0.01em;
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 0 40px;
    }

    /* ── Carousel ── */
    .carousel-wrap {
      position: relative;
      width: 100%;
      max-width: 360px;
      margin: 0 auto;
      user-select: none;
    }

    .carousel-clip {
      width: 100%;
      overflow: hidden;
      padding: 12px 4px 24px;
    }

    .carousel-track {
      display: flex;
      will-change: transform;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .carousel-slide {
      min-width: 100%;
      margin-right: 20px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: none;
    }

    .carousel-slide img {
      width: 100%;
      display: block;
    }

    /* ── Dots ── */
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
      margin-bottom: 12px;
    }

    .carousel-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(10,10,10,0.12);
      transition: background 0.25s ease, transform 0.25s ease;
      cursor: pointer;
    }

    .carousel-dot.active {
      background: #999;
      transform: scale(1.3);
    }

    /* ── Footer ── */
    footer {
      display: flex;
      justify-content: center;
      padding: 8px 24px 24px;
    }
    footer img { height: 36px; opacity: 0.5; }
  </style>
</head>
<body>

  <!-- Header -->
  <main>
    <div class="page-header">
      <img src="brand_assets/Deqly-Icon.png" alt="Deqly Icon" />
      <h1>Kristofer Miguel</h1>
      <p>Powered by Deqly</p>
    </div>
    <div class="carousel-wrap" id="krisCarousel">
      <div class="carousel-clip">
        <div class="carousel-track" id="krisTrack">
          <div class="carousel-slide">
            <img src="brand_assets/Kris-Card-1.png" alt="Kris Card 1" draggable="false" />
          </div>
          <div class="carousel-slide">
            <img src="brand_assets/Kris-Card-2.png" alt="Kris Card 2" draggable="false" />
          </div>
          <div class="carousel-slide">
            <img src="brand_assets/Kris-Card-3.png" alt="Kris Card 3" draggable="false" />
          </div>
          <div class="carousel-slide">
            <img src="brand_assets/Kris-Card-4.png" alt="Kris Card 4" draggable="false" />
          </div>
        </div>
      </div>

      <div class="carousel-dots" id="krisDots">
        <div class="carousel-dot active" data-idx="0"></div>
        <div class="carousel-dot" data-idx="1"></div>
        <div class="carousel-dot" data-idx="2"></div>
        <div class="carousel-dot" data-idx="3"></div>
      </div>

      <div style="text-align:center; margin-top: 24px; display:flex; flex-direction:column; align-items:center; gap:12px;">
        <a href="kris.vcf" download="Kristofer-Miguel.vcf"
           style="display:inline-flex; align-items:center; gap:8px; background:#fa5252; color:#fff; font-size:15px; font-weight:600; letter-spacing:-0.01em; padding:14px 28px; border-radius:100px; text-decoration:none; transition: opacity 0.2s ease, transform 0.2s ease;"
           onmouseover="this.style.opacity='0.85'; this.style.transform='scale(1.03)'"
           onmouseout="this.style.opacity='1'; this.style.transform='scale(1)'"
           onmousedown="this.style.transform='scale(0.97)'"
           onmouseup="this.style.transform='scale(1.03)'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Save to Contacts
        </a>
        <a href="https://www.deqly.com" target="_blank" rel="noopener"
           style="color:#0a0a0a; font-size:14px; font-weight:500; text-decoration:underline; text-underline-offset:3px; transition: opacity 0.2s ease;"
           onmouseover="this.style.opacity='0.5'"
           onmouseout="this.style.opacity='1'">
          Create your own Deqly
        </a>
      </div>
    </div>
  </main>

  <!-- Footer -->

  <footer>
    <img src="brand_assets/Logo.png" alt="Deqly" />
  </footer>

  <script>
    (function() {
      var wrap  = document.getElementById('krisCarousel');
      var track = document.getElementById('krisTrack');
      var dots  = document.querySelectorAll('#krisDots .carousel-dot');
      var total = 4;
      var gap   = 20;
      var current = 0;
      var startX = 0, startY = 0, isDragging = false, dragDelta = 0;

      function goTo(idx) {
        current = Math.max(0, Math.min(total - 1, idx));
        track.style.transition = 'transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94)';
        track.style.transform  = 'translateX(calc(-' + (current * 100) + '% - ' + (current * gap) + 'px))';
        dots.forEach(function(d, i) { d.classList.toggle('active', i === current); });
      }

      dots.forEach(function(d) {
        d.addEventListener('click', function() { goTo(parseInt(d.dataset.idx)); });
      });

      /* Touch */
      var clip = wrap.querySelector('.carousel-clip');
      clip.addEventListener('touchstart', function(e) {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        isDragging = true;
        track.style.transition = 'none';
      }, { passive: true });

      clip.addEventListener('touchmove', function(e) {
        if (!isDragging) return;
        var dx = e.touches[0].clientX - startX;
        var dy = e.touches[0].clientY - startY;
        if (Math.abs(dx) > Math.abs(dy)) {
          e.preventDefault();
          dragDelta = dx;
          track.style.transform = 'translateX(calc(-' + (current * 100) + '% - ' + (current * gap) + 'px + ' + dragDelta + 'px))';
        }
      }, { passive: false });

      clip.addEventListener('touchend', function() {
        isDragging = false;
        if (dragDelta < -50)     goTo(current + 1);
        else if (dragDelta > 50) goTo(current - 1);
        else                     goTo(current);
        dragDelta = 0;
      });

      /* Mouse drag fallback */
      track.addEventListener('mousedown', function(e) {
        startX = e.clientX;
        isDragging = true;
        track.style.transition = 'none';
        e.preventDefault();
      });
      window.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        dragDelta = e.clientX - startX;
        track.style.transform = 'translateX(calc(-' + (current * 100) + '% - ' + (current * gap) + 'px + ' + dragDelta + 'px))';
      });
      window.addEventListener('mouseup', function() {
        if (!isDragging) return;
        isDragging = false;
        if (dragDelta < -50)     goTo(current + 1);
        else if (dragDelta > 50) goTo(current - 1);
        else                     goTo(current);
        dragDelta = 0;
      });
    })();
  </script>

</body>
</html>
